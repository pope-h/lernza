name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            contracts:
              - 'contracts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Frontend: lint + type-check + build ──────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check & build
        run: pnpm run build

      - name: Get baseline bundle size
        id: baseline
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.base_ref }}"
          git fetch origin "$BASE_SHA" --depth=1
          BASELINE=$(git show "origin/$BASE_SHA:frontend/dist/assets" 2>/dev/null | grep -oP '\d+ KB' | head -1 || echo "unknown")
          echo "size=$BASELINE" >> $GITHUB_OUTPUT

      - name: Analyze bundle size
        id: bundle
        run: |
          cd dist
          TOTAL_SIZE=$(du -sh . | cut -f1)
          ASSETS_SIZE=$(du -sh assets | cut -f1)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "assets_size=$ASSETS_SIZE" >> $GITHUB_OUTPUT

          echo "### Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total dist | $TOTAL_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Assets | $ASSETS_SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Comment bundle size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { total_size, assets_size } = process.env;
            const body = `## 📦 Bundle Size Report\n\n| Metric | Size |\n|--------|------|\n| Total dist | ${total_size} |\n| Assets | ${assets_size} |\n\n_This helps track frontend bundle size changes._`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Bundle Size Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
        env:
          total_size: ${{ steps.bundle.outputs.total_size }}
          assets_size: ${{ steps.bundle.outputs.assets_size }}

  # ── Contracts: fmt + clippy + test + build WASM ──────────────────
  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stellar-cli
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,wasm32v1-none
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM contracts
        run: stellar contract build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: contracts-wasm
          path: target/wasm32v1-none/release/*.wasm
          retention-days: 14
